---
name: Update MCP Changelogs

# Manually triggered. Runs the mcp-change-summary skill, which reads the AA and CJA
# changelogs, gathers what shipped in the MCP repos since each was last updated, writes a
# new dated entry into each, and opens a single PR with both edits.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-changelog:
    name: Update MCP Changelogs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install skill
        # Claude Code discovers skills under ~/.claude/skills; the skill's script paths
        # are written relative to that location.
        run: |
          mkdir -p ~/.claude/skills
          cp -r .github/workflows/mcp-change-summary ~/.claude/skills/mcp-change-summary

      - name: Generate changelog entries
        env:
          # Route Claude Code through Amazon Bedrock, authenticated with a Bedrock API key
          # (bearer token) rather than AWS access keys.
          CLAUDE_CODE_USE_BEDROCK: "1"
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.OPUS_4_7_API_KEY }}
          # Region your Bedrock model access is provisioned in — change if not us-east-1.
          AWS_REGION: us-east-1
          # Read token for the private AdobeAnalytics/* repos (the public adobe/skills repo
          # needs none). A PAT or GitHub App installation token with read access works.
          MCP_CHANGE_SUMMARY_TOKEN: ${{ secrets.MCP_CHANGE_SUMMARY_TOKEN }}
        run: |
          claude -p "Use the mcp-change-summary skill to update src/pages/aa/changelog.md and src/pages/cja/changelog.md. Add a new dated entry to each covering everything that shipped since the file's most recent entry. Edit the files in place only — do not commit or open a pull request. If there are no relevant changes, leave the files untouched." \
            --model us.anthropic.claude-opus-4-7 \
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep" \
            --permission-mode acceptEdits

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          # Default GITHUB_TOKEN creates the PR in this repo. Use a PAT here instead if you
          # need the PR to trigger the repo's other workflows (lint/validate).
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: changelog/auto-update
          delete-branch: true
          add-paths: |
            src/pages/aa/changelog.md
            src/pages/cja/changelog.md
          commit-message: "Update AA and CJA MCP changelogs"
          title: "Update AA and CJA MCP changelogs"
          body: |
            Automated changelog update generated by the **Update MCP Changelogs** workflow.

            Adds a new dated entry to `src/pages/aa/changelog.md` and
            `src/pages/cja/changelog.md` summarizing what shipped across the MCP repos since
            each file was last updated.

            Please review the changelog before merging.
